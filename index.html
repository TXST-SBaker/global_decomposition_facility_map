  <style>
    :root,
    [data-theme="light"] {
      --text-xs: 0.74rem;
      --text-sm: 0.82rem;
      --text-base: 0.9rem;
      --text-lg: 1rem;
      --text-xl: 1.3rem;

      --space-1: 0.25rem;
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;

      --color-bg: #f5f4f1;
      --color-surface: #faf9f7;
      --color-surface-2: #f2efe9;
      --color-panel: #f7f4ef;
      --color-overlay: rgba(247, 244, 239, 0.95);
      --color-border: #d1cdc5;

      --color-text: #22201c;
      --color-text-muted: #5f5b55;
      --color-text-soft: #78726b;
      --color-text-inverse: #ffffff;

      --color-primary: #0d6a70;
      --color-primary-hover: #0a575c;

      --color-human: #8b1e3f;
      --color-animal: #01696f;
      --color-mixed: #6b46c1;
      --color-neutral: #4b5563;

      --radius-sm: 0.35rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-full: 9999px;

      --shadow-sm: 0 1px 2px rgba(20,20,20,0.06);
      --shadow-md: 0 10px 25px rgba(20,20,20,0.14);

      --font-body: 'Satoshi', sans-serif;
      --font-display: 'Boska', serif;

      --details-width: 300px;
      --details-collapsed-width: 54px;
    }

    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1d1b18;
      --color-surface-2: #24211e;
      --color-panel: #1b1917;
      --color-overlay: rgba(27, 25, 23, 0.95);
      --color-border: #3d3832;

      --color-text: #f3eee7;
      --color-text-muted: #ddd5c8;
      --color-text-soft: #bdb4a8;
      --color-text-inverse: #111111;

      --color-primary: #86c6cd;
      --color-primary-hover: #a6d8dd;

      --color-human: #f3a8bb;
      --color-animal: #86c6cd;
      --color-mixed: #c0a7ff;
      --color-neutral: #cdd2d8;

      --shadow-sm: 0 1px 2px rgba(0,0,0,0.35);
      --shadow-md: 0 10px 25px rgba(0,0,0,0.32);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-body);
      font-size: var(--text-base);
      line-height: 1.45;
      background: var(--color-bg);
      color: var(--color-text);
    }

    a {
      color: var(--color-primary);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    button, input, select {
      font: inherit;
      color: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: var(--details-width) 1fr;
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      transition: grid-template-columns 220ms ease;
    }

    .app.details-collapsed {
      grid-template-columns: var(--details-collapsed-width) 1fr;
    }

    .details-panel {
      height: 100dvh;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr;
      grid-template-rows: auto 1fr;
      background: linear-gradient(180deg, var(--color-surface), var(--color-surface-2));
      border-right: 1px solid var(--color-border);
    }

    .details-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-2);
      padding: 0.75rem;
      border-bottom: 1px solid var(--color-border);
      background: color-mix(in srgb, var(--color-panel) 90%, transparent);
      min-height: 54px;
    }

    .details-header-title {
      min-width: 0;
    }

    .details-header-title strong {
      display: block;
      font-size: var(--text-sm);
      line-height: 1.15;
    }

    .details-header-title span {
      display: block;
      font-size: var(--text-xs);
      color: var(--color-text-muted);
      margin-top: 0.12rem;
    }

    .details-scroll {
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: var(--space-4);
      scrollbar-width: thin;
    }

    .app.details-collapsed .details-header-title,
    .app.details-collapsed .details-scroll {
      display: none;
    }

    .app.details-collapsed .details-panel-header {
      justify-content: center;
      padding: 0.5rem;
    }

    .brand-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-3);
      margin-bottom: var(--space-4);
    }

    .brand {
      display: flex;
      gap: var(--space-3);
      min-width: 0;
      align-items: flex-start;
    }

    .logo svg {
      width: 30px;
      height: 30px;
      color: var(--color-primary);
      flex: none;
      margin-top: 0.15rem;
    }

    .brand-text h1 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      line-height: 1.05;
      margin-bottom: 0.2rem;
    }

    .brand-text p {
      font-size: var(--text-sm);
      line-height: 1.35;
      color: var(--color-text-muted);
      max-width: 24ch;
    }

    .brand-actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      flex: none;
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border);
      background: var(--color-panel);
      color: var(--color-text);
      display: grid;
      place-items: center;
